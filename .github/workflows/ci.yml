name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install API dependencies
        run: python -m pip install -r apps/api-server/requirements.txt
      - name: Install web dependencies
        run: npm --prefix apps/web-dashboard install
      - name: Seed demo data
        run: python scripts/seed_demo_data.py
      - name: Generate frontend snapshot
        run: python scripts/generate_frontend_snapshot.py
      - name: Self check
        run: python scripts/self_check.py
      - name: Unit tests
        run: python -m pytest tests
      - name: Smoke demo
        run: python scripts/smoke_demo.py
      - name: Tone scan
        run: python scripts/check_ai_tone.py
      - name: Frontend build
        run: npm --prefix apps/web-dashboard run build
